name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-quality-gate:
    name: backend-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://kairo:kairo@localhost:5432/kairo
      JWT_SECRET_KEY: test-jwt-secret-key-32-chars-minimum!!

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kairo
          POSTGRES_USER: kairo
          POSTGRES_PASSWORD: kairo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kairo -d kairo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run lint
        run: ruff check . --select F

      - name: Compile Python sources
        run: |
          env PYTHONPYCACHEPREFIX=/tmp/kairo-ci-pycache python -m compileall app tests

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q
