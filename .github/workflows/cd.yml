name: cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Deploy on EC2 with SSM
        env:
          APP_PORT: ${{ vars.APP_PORT }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ENV_FILE_PATH: ${{ vars.ENV_FILE_PATH }}
          FORWARDED_ALLOW_IPS: ${{ vars.FORWARDED_ALLOW_IPS }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Production assumption:
          # - the API container is reachable only on 127.0.0.1:${APP_PORT}
          # - public traffic must come through HTTPS termination (ALB/ACM or nginx TLS)
          # - no deployment should rely on direct public access to :8000
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          cat > ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "docker pull ${IMAGE_URI}",
              "docker stop ${CONTAINER_NAME} || true",
              "docker rm ${CONTAINER_NAME} || true",
              "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped --env-file ${ENV_FILE_PATH} -e FORWARDED_ALLOW_IPS='${FORWARDED_ALLOW_IPS:-*}' -p 127.0.0.1:${APP_PORT}:8000 ${IMAGE_URI}",
              "curl --fail http://127.0.0.1:${APP_PORT}/api/v1/health/live",
              "curl --fail http://127.0.0.1:${APP_PORT}/api/v1/health/ready"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy kairo-backend ${GITHUB_SHA}" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          STATUS="Pending"
          until [[ "${STATUS}" != "Pending" && "${STATUS}" != "InProgress" && "${STATUS}" != "Delayed" ]]; do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" \
              --output text)
            echo "Current deploy status: ${STATUS}"
          done

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text

          test "${STATUS}" = "Success"
