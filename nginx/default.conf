# Kairo production reverse-proxy template.
#
# Deployment assumptions:
# - Public user traffic should arrive over HTTPS.
# - Do not expose the FastAPI container directly on a public :8000 socket.
# - The API container should stay bound to 127.0.0.1 on the host and only be
#   reachable through this proxy or an upstream HTTPS load balancer.
# - Replace `api.kairo.example` with the real production hostname before use.
#
# TLS termination options:
# 1. Terminate TLS directly in nginx with a separate `listen 443 ssl` server.
# 2. Terminate TLS upstream (for example ALB/ACM) and forward HTTP to nginx,
#    preserving `X-Forwarded-Proto` and `X-Forwarded-Port`.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.kairo.example;

    # Preserve the original scheme/port when nginx sits behind another proxy
    # that already terminated TLS. Otherwise fall back to nginx's own values.
    set $kairo_forwarded_proto $scheme;
    if ($http_x_forwarded_proto != "") {
        set $kairo_forwarded_proto $http_x_forwarded_proto;
    }

    set $kairo_forwarded_port $server_port;
    if ($http_x_forwarded_port != "") {
        set $kairo_forwarded_port $http_x_forwarded_port;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $kairo_forwarded_port;
        proxy_set_header X-Forwarded-Proto $kairo_forwarded_proto;
    }
}
